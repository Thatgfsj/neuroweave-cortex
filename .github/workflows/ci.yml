name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -q

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          set -euo pipefail

          PYPROJECT_VERSION=$(grep -Po '(?<=version = ")[^"]+' pyproject.toml)
          INIT_VERSION=$(grep -Po '(?<=__version__ = ")[^"]+' star_graph/__init__.py)
          YAML_VERSION=$(grep -Po '(?<=version: ")[^"]+' star_graph/defaults.yaml)
          MCP_VERSION=$(grep -Po '(?<=version=")[^"]+' star_graph/mcp_server.py)

          echo "pyproject.toml:          $PYPROJECT_VERSION"
          echo "star_graph/__init__.py:   $INIT_VERSION"
          echo "star_graph/defaults.yaml: $YAML_VERSION"
          echo "star_graph/mcp_server.py: $MCP_VERSION"

          if [ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]; then
            echo "ERROR: pyproject.toml ($PYPROJECT_VERSION) != __init__.py ($INIT_VERSION)"
            exit 1
          fi

          if [ "$PYPROJECT_VERSION" != "$YAML_VERSION" ]; then
            echo "ERROR: pyproject.toml ($PYPROJECT_VERSION) != defaults.yaml ($YAML_VERSION)"
            exit 1
          fi

          if [ "$PYPROJECT_VERSION" != "$MCP_VERSION" ]; then
            echo "ERROR: pyproject.toml ($PYPROJECT_VERSION) != mcp_server.py ($MCP_VERSION)"
            exit 1
          fi

          echo "✅ All version strings match: $PYPROJECT_VERSION"
