# NeuroWeave Cortex (NWC) — default hyperparameters
# v1.2.0 config system — every neuroscience mechanism is tunable

version: "1.0.0"

# ── Memory Tiering (STM/MTM/LTM/Core) ──
tier:
  stm_max_items: 100
  stm_ttl_hours: 2.0
  mtm_max_topics: 2000
  ltm_max_summaries: 500
  core_max_entries: 50
  stm_to_mtm_threshold: 0.3
  mtm_to_ltm_threshold: 0.5
  ltm_to_core_threshold: 0.7

anchor:
  default_importance: 0.5
  default_frequency: 0.0
  default_recency: 1.0
  default_emotional_valence: 0.0
  default_stability: 0.0
  default_surprise: 0.5
  default_hippocampal_dependency: 1.0
  max_text_length: 280

  retention:
    # v0.4 additive weights (kept for backward compat, v0.5 multiplicative model
    # uses the factors below directly in retention_score)
    importance_weight: 0.25
    frequency_weight: 0.20
    recency_weight: 0.20
    stability_weight: 0.15
    surprise_weight: 0.10
    cortical_weight: 0.10
    rehearsing_boost: 1.3
    ghost_penalty: 0.3
    reactivated_penalty: 0.7
    # v0.5 multiplicative decay — half-life in days for natural decay factor
    decay_half_life_days: 30

  decay:
    base_half_life_hours: 168.0
    ghost_half_life_factor: 0.3
    dormant_half_life_factor: 1.5
    reactivated_half_life_factor: 0.7

  consolidation:
    strengthen_threshold: 0.15
    update_threshold: 0.50
    strengthen_importance_delta: 0.10
    strengthen_stability_delta: 0.30
    update_stability_delta: -0.15
    reconsolidation_stability_factor: 0.7

  state_entry:
    consolidating_stability_boost: 0.1
    dormant_min_stability: 0.7
    reactivated_stability: 0.2
    reactivated_surprise: 0.8
    activation_frequency_boost: 0.05

  oscillator:
    default_frequency: 0.5
    default_phase: 0.0
    default_coupling: 0.3
    default_damping: 0.1
    coupling_base: 0.25
    coupling_emotion_factor: 0.15
    critical_width_factor: 0.15

sleep:
  auto_micro_interval_hours: 1.0    # auto-trigger micro_consolidate every N hours
  auto_full_interval_hours: 24.0    # auto-trigger full sleep every N hours
  auto_anchor_threshold: 100        # auto-trigger micro when N new anchors since last

  swr:
    valence_weight: 0.25
    surprise_weight: 0.25
    frequency_weight: 0.20
    centrality_weight: 0.15
    instability_weight: 0.15
    top_fraction: 0.5
    sample_fraction: 0.33

  systems:
    tau: 20.0
    min_hippocampal_dep: 0.05
    schema_stability_threshold: 0.8
    schema_text_threshold: 100
    temporal_edge_weaken: 0.015
    topical_edge_strengthen: 0.01
    cortical_stability_factor: 0.9

  emotional:
    decay: 0.75
    strip_stability_threshold: 0.5
    importance_min_factor: 0.97
    importance_emotional_residual: 0.25
    importance_baseline: 0.15

  schema:
    min_instances: 3
    min_similarity: 0.6

  merge:
    default_threshold: 0.85
    importance_blend: 0.7
    stability_boost: 0.15
    min_tag_overlap: 1

  prune:
    default_retention_threshold: 0.15
    default_edge_threshold: 0.1
    contradiction_penalty: 0.2
    residual_edge_factor: 0.3
    ghost_stale_days: 30

  bridge:
    min_score: 0.6
    default_weight: 0.3

  hebbian:
    strengthen_delta: 0.03
    decay_log_factor: 0.02
    active_window_hours: 24
    max_decay: 0.1

  homeostasis:
    target_mean: 0.3
    scale_blend: 0.5

  # ── Sleep Rebuild (N3d) ──
  rebuild_fuse_threshold: 0.85      # cosine threshold for multi-node fusion
  rebuild_min_cluster: 3            # minimum anchors to form a fusion cluster
  rewire_drop_threshold: 0.05       # edges below this weight with 0 co-activation → drop
  rewire_strengthen_min_coact: 3    # co-activation count to trigger strengthen
  rewire_transitive_min_weight: 0.6 # minimum edge weight for transitive closure
  rewire_transitive_decay: 0.7      # decay factor for transitive edge weight
  abstractive_min_group: 4          # minimum anchors to form an abstractive pattern
  abstractive_decay_factor: 0.6     # how much to decay concrete anchors after abstraction
  dynamic_cluster_coact: 5          # co-activation threshold to auto-form clusters

  edge_formation:
    emotion_weight_boost: 0.3

retrieval:
  oscillation:
    phase_weight: 0.3
    default_frequency: 0.5
    magnitude_base: 0.4
    magnitude_variance_factor: 0.6
    frequency_base: 0.3
    frequency_centroid_factor: 0.7

  spreading:
    steps: 3
    decay: 0.6
    min_edge_weight: 0.05
    resonance_weight: 0.6
    activation_weight: 0.4
    resonance_map_bonus: 0.7
    min_score_threshold: 0.05

  cortical:
    top_k: 10

  constellation:
    max_size: 20
    min_edge_weight: 0.1

ghost:
  compressed_dim: 16
  initial_reactivation_prob: 0.5
  emotion_attenuation: 0.6
  emotion_resonance_threshold: 0.2
  emotion_bonus_factor: 0.15
  min_effective_prob: 0.05
  revival_stability_boost: 0.2
  resonance_persistence: 0.01

  partial_recall:
    confidence_factor: 0.3
    decay_per_call: 0.1
    min_confidence: 0.05

  decay:
    half_life_days: 60
    purge_prob_threshold: 0.01
    purge_no_revival_days: 90

  resonance:
    default_threshold: 0.5
    fuzzy_threshold: 0.2
    fuzzy_sub_factor: 0.3

  active_threshold: 0.1

abstraction:
  min_cluster_size: 3
  similarity_threshold: 0.55
  stable_confidence: 0.7

competition:
  suppression_radius: 2.0
  base_suppression: 0.1
  emotional_boost_threshold: 0.5
  emotional_suppression_boost: 1.3
  winner_stability_factor: 0.5
  winner_recency_factor: 0.3
  edge_weaken_factor: 0.5
  competitor_threshold: 0.2
  tag_weight: 0.3
  embedding_weight: 0.5
  graph_weight: 0.2
  interference_threshold: 0.7
  interference_importance_factor: 0.7
  interference_stability_factor: 0.8
  rif_similarity_threshold: 0.5
  rif_factor: 0.05
  rif_stability_factor: 0.3

graph:
  contradiction_threshold: 0.7
  max_edges_per_node: 32
  max_degree_total: 24
  edge_budget_enabled: true
  max_total_anchors: 50000          # hard cap — evicts when exceeded (0 = disabled)
  eviction_policy: "lowest_retention"  # lru | fifo | lowest_retention
  spreading:
    default_steps: 3
    default_decay: 0.6
    min_weight: 0.05
  ghost_revival_threshold: 0.75

working_memory:
  max_capacity: 15
  ttl_seconds: 3600.0

exact_cache:
  max_entries_per_key: 5
  auto_harvest: true
  harvest_on_remember: true

cortex:
  default_token_budget: 2000
  default_decay_half_life_days: 30
  default_retention_threshold: 0.15
  max_anchors_before_consolidate: 1000
  consolidate_interval_hours: 24.0

routing:
  max_cortices: 3
  min_score: 0.1
  route_semantic_weight: 0.6
  route_keyword_weight: 0.3
  route_recency_weight: 0.1

gate:
  k: 20
  lateral_inhibition_radius: 0.7
  inhibition_strength: 0.3
  w_importance: 0.20
  w_recency: 0.15
  w_emotional: 0.10
  w_semantic: 0.25
  w_causal: 0.10
  w_focus: 0.15
  w_novelty: 0.05

timespine:
  max_clusters_per_day: 10
  cluster_similarity_threshold: 0.5
  max_days_scan: 30
  max_clusters_scan: 20

cascade:
  max_depth: 5
  min_causal_strength: 0.2
  max_chains: 5

hippocampus:
  enabled: true                   # route new input through hippocampus before LTM
  l1_ttl_minutes: 30              # L1 instant buffer — raw text, no graph
  l2_ttl_hours: 24                # L2 short-term — lightweight vector + local edges
  l1_max_items: 50                # max items in L1 before eviction
  l2_max_items: 200               # max items in L2 before eviction
  promote_threshold: 3             # access count needed to promote L1→L2

hub:
  leaf_stability: 0.9
  domain_stability: 0.95
  global_stability: 0.99
  max_degree_per_shard: 50
  shard_split_min_size: 8
  shard_split_clusters: 3
  shard_routing_top_k: 2

raw_buffer:
  max_sessions: 2               # keep last N sessions uncompressed
  max_chunks_per_session: 500   # cap per session to bound memory
  bm25_weight: 0.5              # weight of BM25 vs vector in raw search (0=vector only)
  merge_weight: 0.5             # weight of raw results in final merged ranking (0=graph only)

atom_facts:
  provider: template              # "openai", "anthropic", or "template" (offline)
  model: gpt-4o-mini              # model name (only used for openai/anthropic)
  min_cluster_size: 3             # minimum anchors in cluster to trigger extraction
  max_anchors_per_batch: 15       # max anchors sent to LLM per extraction
  min_fact_confidence: 0.4        # filter out facts below this confidence

dual_channel:
  s1_confidence_threshold: 0.35   # below this, System-2 auto-triggers
  s2_max_depth: 4                 # max traversal depth for hierarchical search
  merge_weight_s1: 0.4            # weight of System-1 in merged results
  merge_weight_s2: 0.6            # weight of System-2 in merged results
  auto_trigger_keywords: true     # auto-trigger on structural keywords (all/every/list/...)

community:
  max_community_size: 200
  min_community_size: 3
  max_iterations: 50
  intra_community_min_results: 5
  route_centroid_weight: 0.7

index:
  algorithm: "brute"
  metric: "cosine"
  n_trees: 10
  rebuild_on_adds: 50

snapshot:
  keep: 5                       # keep last N snapshots
  compress: true                # gzip-compress snapshot files
  auto_interval_hours: 6.0      # min hours between auto-snapshots

survival:
  function: ebbinghaus          # ebbinghaus, power_law, exponential, custom

  # Ebbinghaus params: S = min_hours + strength * (max_hours - min_hours)
  ebbinghaus_min_hours: 1.0
  ebbinghaus_max_hours: 336.0

  # Power-law params: R = (1 + t/S)^(-alpha)
  power_law_alpha: 0.5
  power_law_scale: 50.0

  # Exponential params: lambda per day
  exponential_lambda_per_day: 0.05

  # Ghost decay uses compressed S range (faster decay)
  ghost:
    ebbinghaus_min_factor: 0.2
    ebbinghaus_max_factor: 0.15
    base_strength_factor: 0.5

tracing:
  enabled: true                 # enable/disable all tracing
  max_traces: 100               # max traces to keep in memory

compression:
  episodic_token_limit: 150
  strategic_token_limit: 100
  meta_token_limit: 70
  min_cluster_size: 3
  similarity_threshold: 0.55
  max_source_anchors: 30
  source_retention_factor: 0.3
  summary_initial_stability: 0.85
  summary_hippocampal_dependency: 0.1

# ── Cognitive Compiler (#45) ──
compiler:
  episodic_ratio: 0.20
  concept_ratio: 0.10
  worldview_ratio: 0.25
  min_worldview_confidence: 0.4
  min_worldview_evidence: 2
  worldview_half_life_days: 90.0
  similarity_threshold: 0.55
  max_worldviews: 20

# ── Self-Reflection Loop (#46) ──
reflection_loop:
  contradiction_threshold: 0.7
  min_confidence_gap: 0.15
  weaken_factor: 0.30
  ghost_on_correction: true
  max_reports: 100
  auto_revive_threshold: 0.3

# ── Graph-First Retrieval (#47) ──
graph_first:
  graph_weight: 0.6
  embedding_weight: 0.4
  max_depth: 2
  seed_count: 5

# ── Domain Router (#48) ──
domain_router:
  enabled: true
  route_semantic_weight: 0.6
  route_keyword_weight: 0.4
  depth_bonus: 0.3

# ── Edge Budget (#49) ──
edge_budget:
  max_edges: 32
  enforce_on_every_add: true

# ── Write Gate (#50) ──
write_gate:
  enabled: false                    # opt-in: enable to filter noise before storage
  min_importance: 0.15
  min_text_length: 8
  max_text_length: 4000
  duplicate_threshold: 0.92
  merge_threshold: 0.75
  noise_pattern_score: -0.3
  emotional_noise_threshold: 0.85
  debounce_window_seconds: 10.0

# ── Four-Layer Compression (#51) ──
four_layer:
  enabled: false                    # opt-in: enable for message→event→semantic→personality compression
  layer0:
    max_items: 500
    ttl_hours: 2.0
    compression_ratio: 0.2
  layer1:
    max_items: 200
    ttl_hours: 168.0
    compression_ratio: 0.15
  layer2:
    max_items: 50
    ttl_hours: 2160.0
    compression_ratio: 0.1
  layer3:
    max_items: 20
    ttl_hours: 0
    compression_ratio: 0.0

# ── Thermal Store (#53) ──
thermal_store:
  hot_to_cold_hours: 72.0            # idle hours before hot→cold demotion
  cold_to_archive_hours: 720.0       # idle hours before cold→archive
  promote_accesses: 2                # access count to trigger promotion
  promote_window_hours: 24.0         # time window for access count tracking

# ── Edge Decay (#54) ──
edge_decay:
  base_multiplier: 1.0               # global decay speed multiplier
  min_edge_weight: 0.02              # edges below this are evicted

# ── Self-Organization (#55) ──
self_org:
  merge_threshold: 0.88
  cluster_similarity: 0.55
  min_cluster_size: 3
  max_topics: 30

# ── Personality Model (#56) ──
personality:
  update_on_remember: true           # incremental ingest per anchor
  extract_on_sleep: true             # full extraction during sleep

# ── Goal Tree (#57) ──
goal_tree:
  detect_on_sleep: true              # scan for new goals during sleep
  propagate_on_sleep: true           # propagate sub-goal progress upward
  archive_stale_hours: 168.0         # archive goals idle for 7 days
  archive_achieved_hours: 720.0      # archive achieved goals after 30 days

# ── Retrieval Budget (S-5) ──
retrieval_budget:
  max_hops: 3                        # max BFS depth from seed nodes
  max_nodes: 24                      # max activated nodes per query
  max_tokens: 6000                   # max token budget for retrieved content

# ── Versioned Memory / Cognitive Trajectory (A-9) ──
versioned_memory:
  detect_on_sleep: true              # scan for belief evolution chains during sleep
  refine_threshold: 0.6              # word overlap ratio to consider as refinement
  max_trajectory_depth: 10           # max versions per belief chain

# ── Cluster Memory (A-10) ──
cluster_memory:
  min_cluster_size: 5                # minimum anchors to form a cluster
  max_clusters: 50                   # max cluster centroids
  route_top_k: 3                     # top clusters to route queries to

# ── Causal Edges (B-12) ──
causal_edges:
  min_confidence: 0.3                # minimum confidence for heuristic type inference
  max_chain_depth: 5                 # max depth for causal chain tracing
  min_chain_strength: 0.2            # minimum edge weight for chain traversal

# ── Episodic Memory (B-13) ──
episodic_memory:
  record_on_remember: true           # auto-record episode on each remember()
  auto_summarize_on_sleep: true      # summarize completed sessions during sleep
  max_episodes_per_session: 500      # cap episodes per session
  emotional_arc_window: 20           # episodes to consider for emotional arc
