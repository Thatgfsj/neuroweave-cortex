[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "star-graph-memory"
version = "0.1.0"
description = "A star-graph memory system with sleep-based consolidation, inspired by hippocampal memory processing"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "numpy>=1.26",
    "scikit-learn>=1.4",
    "sentence-transformers>=2.7",
]

[project.scripts]
sg-sleep = "star_graph.cli:sleep"
sg-add = "star_graph.cli:add"
sg-query = "star_graph.cli:query"

[tool.setuptools.packages.find]
where = ["."]
