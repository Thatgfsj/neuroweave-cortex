[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "star-graph-memory"
version = "0.3.0-dev"
description = "Hippocampal-inspired star graph memory with oscillatory resonance, predictive coding, and 9-phase sleep consolidation. AI long-term memory via anchor points, spreading activation, and nightly replay/merge/prune/bridge cycles."
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "numpy>=1.26",
    "scikit-learn>=1.4",
    "sentence-transformers>=2.7",
]

[project.scripts]
sg-sleep = "star_graph.cli:sleep_cmd"
sg-add = "star_graph.cli:add"
sg-query = "star_graph.cli:query"
sg-stats = "star_graph.cli:stats_cmd"

[tool.setuptools.packages.find]
where = ["."]
